<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ConstructAIQ — Offline</title>
  <style>
    body {
      background: #000; color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh; margin: 0; text-align: center; padding: 24px;
    }
    .logo { font-size: 22px; font-weight: 700; margin-bottom: 32px; color: #f5a623; }
    h1 { font-size: 20px; margin-bottom: 12px; }
    p  { font-size: 15px; color: #a0a0ab; line-height: 1.6; max-width: 320px; }
    .retry { margin-top: 28px; background: #0a84ff; color: #fff;
             border: none; padding: 12px 28px; border-radius: 12px;
             font-size: 15px; font-weight: 600; cursor: pointer; }
  </style>
</head>
<body>
  <div class="logo">ConstructAIQ</div>
  <h1>You're offline</h1>
  <p>Check your connection. Cached data from your last visit is available in the dashboard.</p>
  <button class="retry" onclick="window.location.reload()">Try again</button>
</body>
</html>
