name: Satellite BSI Pipeline

on:
  schedule:
    # Run every Sunday at 02:00 UTC
    # Sentinel-2 revisits most US MSAs every 5 days
    # Weekly processing balances coverage vs compute cost
    - cron: '0 2 * * 0'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions UI
    inputs:
      dry_run:
        description: 'Dry run (no Supabase writes)'
        required: false
        default: 'false'

jobs:
  process-satellite:
    name: Compute BSI for all MSAs
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: satellite/requirements.txt

      - name: Install dependencies
        run: |
          cd satellite
          pip install -r requirements.txt

      - name: Run BSI pipeline
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          COPERNICUS_CLIENT_ID: ${{ secrets.COPERNICUS_CLIENT_ID }}
          COPERNICUS_CLIENT_SECRET: ${{ secrets.COPERNICUS_CLIENT_SECRET }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: python satellite/process_bsi.py

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: satellite-pipeline-logs
          path: satellite/*.log
          retention-days: 7
