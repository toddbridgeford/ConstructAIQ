name: Daily Data Refresh

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run (all, harvest, forecast, federal, solicitations, permits)'
        required: false
        default: 'all'

jobs:
  refresh:
    name: Refresh all data sources
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      APP_URL: https://constructaiq.trade
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
      SAM_GOV_API_KEY: ${{ secrets.SAM_GOV_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 0 — Validate environment
        run: |
          echo "Validating required secrets..."
          MISSING=0
          [ -z "$CRON_SECRET" ] && echo "MISSING: CRON_SECRET" && MISSING=1
          [ "$MISSING" = "1" ] && echo "Critical secrets missing" && exit 1
          echo "Environment OK"

      - name: 1 — Harvest government data (FRED/BLS/Census)
        if: ${{ github.event.inputs.job == 'all' || github.event.inputs.job == 'harvest' || github.event_name == 'schedule' }}
        run: |
          echo "Fetching government data..."
          HTTP=$(curl -s -o harvest.json -w "%{http_code}" -X GET "$APP_URL/api/cron/harvest" \
            -H "Authorization: Bearer $CRON_SECRET")
          echo "HTTP $HTTP"
          cat harvest.json | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          if 'error' in d:
            print('ERROR:', d['error'])
            sys.exit(1)
          print(f'Harvested: {d.get(\"harvested\",[])}')
          print(f'Records: {d.get(\"recordsUpserted\",0)} | Errors: {len(d.get(\"errors\",[]))}')
          if d.get('errors'): print('Errors:', d['errors'])
          " 2>/dev/null || cat harvest.json
          [ "$HTTP" -ge 200 ] && [ "$HTTP" -lt 300 ] || (echo "Non-2xx response: HTTP $HTTP" && exit 1)

      - name: Wait for harvest to settle
        run: sleep 15

      - name: 2 — Run forecast models
        if: ${{ github.event.inputs.job == 'all' || github.event.inputs.job == 'forecast' || github.event_name == 'schedule' }}
        run: |
          echo "Running forecast models..."
          HTTP=$(curl -s -o forecast.json -w "%{http_code}" -X GET "$APP_URL/api/cron/forecast" \
            -H "Authorization: Bearer $CRON_SECRET")
          echo "HTTP $HTTP"
          cat forecast.json | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          if 'error' in d:
            print('ERROR:', d['error'])
            sys.exit(1)
          print(f'Processed: {d.get(\"processed\",[])}')
          print(f'Forecasts written: {d.get(\"forecastsWritten\",0)} | Errors: {len(d.get(\"errors\",[]))}')
          if d.get('errors'): print('Errors:', d['errors'])
          " 2>/dev/null || cat forecast.json
          [ "$HTTP" -ge 200 ] && [ "$HTTP" -lt 300 ] || (echo "Non-2xx response: HTTP $HTTP" && exit 1)

      - name: 3 — Refresh federal awards
        if: ${{ github.event.inputs.job == 'all' || github.event.inputs.job == 'federal' || github.event_name == 'schedule' }}
        continue-on-error: true
        run: |
          echo "Refreshing federal data..."
          HTTP=$(curl -s -o federal.json -w "%{http_code}" -X GET "$APP_URL/api/cron/federal" \
            -H "Authorization: Bearer $CRON_SECRET")
          echo "HTTP $HTTP"
          cat federal.json | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          if 'error' in d:
            print('ERROR:', d['error'])
            sys.exit(1)
          print(f'States refreshed: {d.get(\"statesRefreshed\",0)} | From cache: {d.get(\"fromCache\",\"unknown\")}')
          " 2>/dev/null || cat federal.json
          [ "$HTTP" -ge 200 ] && [ "$HTTP" -lt 300 ] || (echo "Non-2xx response: HTTP $HTTP" && exit 1)

      - name: 4 — Fetch SAM.gov solicitations
        if: ${{ github.event.inputs.job == 'all' || github.event.inputs.job == 'solicitations' || github.event_name == 'schedule' }}
        continue-on-error: true
        run: |
          echo "Fetching SAM.gov solicitations..."
          HTTP=$(curl -s -o solicitations.json -w "%{http_code}" -X GET "$APP_URL/api/cron/solicitations" \
            -H "Authorization: Bearer $CRON_SECRET")
          echo "HTTP $HTTP"
          cat solicitations.json | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          if d.get('status') == 'skipped':
            print('Skipped:', d.get('message',''))
          elif 'error' in d:
            print('ERROR:', d['error'])
            sys.exit(1)
          else:
            print(f'Fetched: {d.get(\"fetched\",0)} | Upserted: {d.get(\"upserted\",0)}')
          " 2>/dev/null || cat solicitations.json
          [ "$HTTP" -ge 200 ] && [ "$HTTP" -lt 300 ] || (echo "Non-2xx response: HTTP $HTTP" && exit 1)

      - name: 5 — Fetch city permits
        if: ${{ github.event.inputs.job == 'all' || github.event.inputs.job == 'permits' || github.event_name == 'schedule' }}
        run: |
          echo "Fetching city permits..."
          HTTP=$(curl -s -o permits.json -w "%{http_code}" -X GET "$APP_URL/api/cron/permits" \
            -H "Authorization: Bearer $CRON_SECRET")
          echo "HTTP $HTTP"
          cat permits.json | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          if 'error' in d:
            print('ERROR:', d['error'])
            sys.exit(1)
          cities = d.get('cities', 0)
          if cities == 0:
            print('No permit sources configured yet — run seed-permit-sources.ts')
          else:
            print(f'Cities processed: {cities}')
            for city, r in d.get('results', {}).items():
              print(f'  {city}: inserted={r[\"inserted\"]} promoted={r[\"promoted\"]} errors={r[\"errors\"]}')
          " 2>/dev/null || cat permits.json
          [ "$HTTP" -ge 200 ] && [ "$HTTP" -lt 300 ] || (echo "Non-2xx response: HTTP $HTTP" && exit 1)

      - name: 6 — Weekly brief (Mondays only)
        if: ${{ github.event_name == 'schedule' }}
        continue-on-error: true
        run: |
          DAY=$(date +%u)
          if [ "$DAY" = "1" ]; then
            echo "Monday — generating weekly brief..."
            HTTP=$(curl -s -o brief.json -w "%{http_code}" -X GET "$APP_URL/api/cron/brief" \
              -H "Authorization: Bearer $CRON_SECRET")
            echo "HTTP $HTTP"
            cat brief.json | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          print(f'Source: {d.get(\"source\",\"unknown\")} | Status: {d.get(\"status\",\"unknown\")}')
          if d.get('error'): print('Error:', d['error'])
          " 2>/dev/null || cat brief.json
            [ "$HTTP" -ge 200 ] && [ "$HTTP" -lt 300 ] || (echo "Non-2xx response: HTTP $HTTP" && exit 1)
          else
            echo "Not Monday — skipping brief (day=$DAY)"
          fi

      - name: 7 — Send newsletter (Mondays only)
        if: ${{ github.event_name == 'schedule' }}
        continue-on-error: true
        run: |
          DAY=$(date +%u)
          if [ "$DAY" = "1" ]; then
            echo "Monday — sending newsletter..."
            BATCH=0
            while true; do
              HTTP=$(curl -s -o newsletter.json -w "%{http_code}" \
                -X GET "$APP_URL/api/cron/newsletter?batch=$BATCH" \
                -H "Authorization: Bearer $CRON_SECRET")
              echo "HTTP $HTTP batch $BATCH"
              cat newsletter.json | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          print(f'Sent: {d.get(\"sent\",0)} | Failed: {d.get(\"failed\",0)} | nextBatch: {d.get(\"nextBatch\")}')
          if d.get('error'): print('Error:', d['error'])
          " 2>/dev/null || cat newsletter.json
              NEXT=$(cat newsletter.json | python3 -c \
                "import json,sys; d=json.load(sys.stdin); \
                 print(d.get('nextBatch','done'))" 2>/dev/null)
              [ "$NEXT" = "None" ] || [ "$NEXT" = "done" ] \
                || [ "$NEXT" = "null" ] && break
              BATCH=$NEXT
              sleep 2
            done
            [ "$HTTP" -ge 200 ] && [ "$HTTP" -lt 300 ] || (echo "Non-2xx response: HTTP $HTTP" && exit 1)
          else
            echo "Not Monday — skipping newsletter (day=$DAY)"
          fi

      - name: 8 — Project summaries (Sundays only)
        if: ${{ github.event_name == 'schedule' }}
        continue-on-error: true
        run: |
          DAY=$(date +%u)
          if [ "$DAY" = "7" ]; then
            echo "Sunday — generating project summaries..."
            HTTP=$(curl -s -o summaries.json -w "%{http_code}" -X GET "$APP_URL/api/cron/project-summaries" \
              -H "Authorization: Bearer $CRON_SECRET")
            echo "HTTP $HTTP"
            cat summaries.json | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          print(f'Processed: {d.get(\"processed\",0)} | Failed: {d.get(\"failed\",0)}')
          if d.get('message'): print(d['message'])
          " 2>/dev/null || cat summaries.json
            [ "$HTTP" -ge 200 ] && [ "$HTTP" -lt 300 ] || (echo "Non-2xx response: HTTP $HTTP" && exit 1)
          else
            echo "Not Sunday — skipping project summaries (day=$DAY)"
          fi

      - name: 9 — Evaluate predictions (Wednesdays only)
        if: ${{ github.event_name == 'schedule' }}
        continue-on-error: true
        run: |
          DAY=$(date +%u)
          if [ "$DAY" = "3" ]; then
            echo "Wednesday — evaluating due predictions..."
            HTTP=$(curl -s -o eval.json -w "%{http_code}" -X GET "$APP_URL/api/cron/evaluate-predictions" \
              -H "Authorization: Bearer $CRON_SECRET")
            echo "HTTP $HTTP"
            cat eval.json | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          if 'error' in d:
            print('ERROR:', d['error'])
            sys.exit(1)
          par = d.get('par_pct')
          par_str = f'{par}%' if par is not None else 'n/a (no resolved predictions)'
          print(f'Evaluated: {d.get(\"evaluated\",0)} | Correct: {d.get(\"correct\",0)} | PAR: {par_str}')
          if d.get('errors'): print('Errors:', d['errors'])
          " 2>/dev/null || cat eval.json
            [ "$HTTP" -ge 200 ] && [ "$HTTP" -lt 300 ] || (echo "Non-2xx response: HTTP $HTTP" && exit 1)
          else
            echo "Not Wednesday — skipping prediction evaluation (day=$DAY)"
          fi

      - name: 10 — Compute formation scores
        if: ${{ github.event.inputs.job == 'all' || github.event_name == 'schedule' }}
        continue-on-error: true
        run: |
          echo "Computing project formation scores..."
          BATCH=0
          while true; do
            HTTP=$(curl -s -o formation.json -w "%{http_code}" \
              -X GET "$APP_URL/api/cron/formation-scores?batch=$BATCH" \
              -H "Authorization: Bearer $CRON_SECRET")
            echo "HTTP $HTTP batch $BATCH"
            cat formation.json | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          if 'error' in d:
            print('ERROR:', d['error'])
            sys.exit(1)
          print(f'Processed: {d.get(\"processed\",0)} | Errors: {d.get(\"errors\",[])} | nextBatch: {d.get(\"nextBatch\")}')
          " 2>/dev/null || cat formation.json
            NEXT=$(cat formation.json | python3 -c \
              "import json,sys; d=json.load(sys.stdin); \
               print(d.get('nextBatch','done'))" 2>/dev/null)
            [ "$NEXT" = "None" ] || [ "$NEXT" = "done" ] \
              || [ "$NEXT" = "null" ] && break
            BATCH=$NEXT
            sleep 2
          done
          [ "$HTTP" -ge 200 ] && [ "$HTTP" -lt 300 ] \
            || (echo "Non-2xx: HTTP $HTTP" && exit 1)

      - name: 11 — Compute reality gap scores
        if: ${{ github.event.inputs.job == 'all' || github.event_name == 'schedule' }}
        continue-on-error: true
        run: |
          echo "Computing project reality gap scores..."
          BATCH=0
          while true; do
            HTTP=$(curl -s -o reality.json -w "%{http_code}" \
              -X GET "$APP_URL/api/cron/reality-gaps?batch=$BATCH" \
              -H "Authorization: Bearer $CRON_SECRET")
            echo "HTTP $HTTP batch $BATCH"
            cat reality.json | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          if 'error' in d:
            print('ERROR:', d['error'])
            sys.exit(1)
          print(f'Processed: {d.get(\"processed\",0)} | Errors: {d.get(\"errors\",[])} | nextBatch: {d.get(\"nextBatch\")}')
          " 2>/dev/null || cat reality.json
            NEXT=$(cat reality.json | python3 -c \
              "import json,sys; d=json.load(sys.stdin); \
               print(d.get('nextBatch','done'))" 2>/dev/null)
            [ "$NEXT" = "None" ] || [ "$NEXT" = "done" ] \
              || [ "$NEXT" = "null" ] && break
            BATCH=$NEXT
            sleep 2
          done
          [ "$HTTP" -ge 200 ] && [ "$HTTP" -lt 300 ] \
            || (echo "Non-2xx: HTTP $HTTP" && exit 1)

      - name: 12 — Compute opportunity scores
        if: ${{ github.event.inputs.job == 'all' || github.event_name == 'schedule' }}
        continue-on-error: true
        run: |
          echo "Computing metro opportunity scores..."
          BATCH=0
          while true; do
            HTTP=$(curl -s -o opportunity.json -w "%{http_code}" \
              -X GET "$APP_URL/api/cron/opportunity-scores?batch=$BATCH" \
              -H "Authorization: Bearer $CRON_SECRET")
            echo "HTTP $HTTP batch $BATCH"
            cat opportunity.json | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          if 'error' in d:
            print('ERROR:', d['error'])
            sys.exit(1)
          print(f'Processed: {d.get(\"processed\",0)} | Errors: {d.get(\"errors\",[])} | nextBatch: {d.get(\"nextBatch\")}')
          " 2>/dev/null || cat opportunity.json
            NEXT=$(cat opportunity.json | python3 -c \
              "import json,sys; d=json.load(sys.stdin); \
               print(d.get('nextBatch','done'))" 2>/dev/null)
            [ "$NEXT" = "None" ] || [ "$NEXT" = "done" ] \
              || [ "$NEXT" = "null" ] && break
            BATCH=$NEXT
            sleep 2
          done
          [ "$HTTP" -ge 200 ] && [ "$HTTP" -lt 300 ] \
            || (echo "Non-2xx: HTTP $HTTP" && exit 1)

      - name: Summary
        if: always()
        run: |
          echo "Data refresh complete at $(date -u)"
          echo "Individual step failures above are logged but do not block the workflow."
          echo "Check step outputs for HTTP status codes and error details."
