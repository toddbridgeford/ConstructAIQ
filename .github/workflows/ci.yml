name: CI

on:
  push:
    branches:
      - Predictive-Model
      - main
  pull_request:
    branches:
      - Predictive-Model
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
      BLS_API_KEY: ${{ secrets.BLS_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          # Minimal env for a successful Next.js build.
          # These are public/non-secret values — sufficient
          # to pass static analysis without real API calls.
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder_anon_key
          NEXT_PUBLIC_APP_URL: https://constructaiq.trade
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: placeholder_vapid_key

      - name: Audit (fail on critical)
        run: npm audit --audit-level=critical
